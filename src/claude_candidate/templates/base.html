<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="robots" content="noindex, nofollow" />

	{# OpenGraph tags — populated by child templates #}
	<meta property="og:type" content="website" />
	<meta property="og:title" content="{% block og_title %}{{ og_title | default('Fit Assessment') }}{% endblock %}" />
	<meta property="og:description" content="{% block og_description %}{{ og_description | default('AI-powered job fit assessment') }}{% endblock %}" />
	<meta property="og:site_name" content="roojerry.com" />

	<title>{% block title %}Fit Assessment{% endblock %}</title>

	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
	{% block content %}{% endblock %}
</body>
</html>
